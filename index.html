<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Velocity Runner</title>
<style>
:root{--bg:#08111e;--ink:#f4fbff;--muted:#aac7da;--line:rgba(255,255,255,.12);--warm:#ff8b52;--warm2:#ffd57c;--cool:#8fe8ff;--panel:rgba(8,18,31,.72);--shadow:0 24px 64px rgba(2,7,18,.42)}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;overflow:hidden;background:linear-gradient(180deg,#07111f 0%,#122745 48%,#163256 100%);color:var(--ink);font-family:"Bahnschrift","Trebuchet MS","Segoe UI",sans-serif}a{text-decoration:none;color:inherit}button{font:inherit;border:0;cursor:pointer}
.wrap{width:min(1180px,calc(100% - 2rem));margin:0 auto}.hero{padding:1.2rem 0 2.5rem}.top{display:flex;align-items:center;justify-content:space-between;gap:1rem}.brand{display:flex;align-items:center;gap:.8rem}.mark{display:grid;place-items:center;width:2.75rem;height:2.75rem;border-radius:.95rem;background:linear-gradient(135deg,var(--warm2),var(--warm));color:#12253d;font-weight:800;font-size:1.2rem;box-shadow:0 14px 28px rgba(255,139,82,.24)}.brand-copy{display:block}.brand b{display:block;letter-spacing:.08em;text-transform:uppercase;font-size:1rem}.brand-copy span,.links a,.hero p,.panel p,.feature p,.intro p,.list span{color:var(--muted)}.brand-copy span{display:block;margin-top:.15rem;font-size:.82rem}.links{display:flex;gap:1rem;font-size:.95rem}
.hero-grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.85fr);gap:1.25rem;align-items:stretch;padding:clamp(2.4rem,5vw,4.6rem) 0 0}.eyebrow{display:inline-flex;align-items:center;gap:.55rem;color:var(--cool);text-transform:uppercase;letter-spacing:.18em;font-size:.72rem;font-weight:700}.eyebrow:before{content:"";width:2rem;height:1px;background:currentColor;opacity:.6}.hero h1,.intro h2,.card h3{margin:.9rem 0 1rem;color:#fff8ef;font-family:"Rockwell","Georgia",serif;line-height:.94}.hero h1{max-width:11ch;font-size:clamp(3rem,7vw,5.8rem)}.hero p{max-width:39rem;margin:0;line-height:1.72;font-size:1.05rem}
.actions{display:flex;flex-wrap:wrap;gap:.85rem;margin-top:1.6rem}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:3.1rem;padding:0 1.25rem;border-radius:999px;font-weight:700;transition:transform .2s ease,box-shadow .2s ease,background .2s ease}.btn:hover{transform:translateY(-2px)}.btn-primary{background:linear-gradient(135deg,var(--warm2),var(--warm));color:#13263f;box-shadow:0 18px 36px rgba(255,139,82,.24)}.btn-secondary{background:rgba(255,255,255,.08);color:var(--ink);border:1px solid var(--line)}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.9rem;margin-top:1.9rem}.stat,.panel,.deck,.feature{background:linear-gradient(180deg,rgba(9,20,35,.86),rgba(8,18,31,.62));border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px)}.stat{padding:1rem;border-radius:1.15rem}.stat strong,.panel strong,.deck strong{display:block;color:#fff8ef}.stat small,.kicker{display:block;color:var(--cool);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase}.stat strong{margin-top:.5rem;font-size:1.05rem}.stat p{margin:.45rem 0 0;font-size:.92rem;line-height:1.58}
.panel{border-radius:1.8rem;padding:1.35rem;position:relative;overflow:hidden}.panel:after{content:"";position:absolute;right:-3rem;bottom:-3rem;width:10rem;height:10rem;border-radius:50%;background:radial-gradient(circle,rgba(255,151,90,.24),transparent 70%)}.panel h2{margin:.85rem 0 .7rem;max-width:11ch;color:#fff7ea;font-family:"Rockwell","Georgia",serif;font-size:clamp(1.8rem,3.6vw,2.5rem);line-height:1}.tune{display:grid;gap:.8rem;margin-top:1.15rem}.tune div{padding:1rem;border-radius:1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.tune strong{margin-top:.4rem;font-size:1.35rem}.tune p{margin:.38rem 0 0;font-size:.92rem;line-height:1.55}
.game-shell{position:relative;width:100vw;height:100vh}.stage{position:relative;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#10243c,#08111e);touch-action:none}.stage:before{content:"";position:absolute;inset:.65rem;border-radius:1rem;border:1px solid rgba(255,255,255,.08);pointer-events:none}canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
.cover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(180deg,rgba(3,8,18,.12),rgba(3,8,18,.42) 46%,rgba(3,8,18,.72));opacity:0;pointer-events:none;transition:opacity .24s ease}.cover.show{opacity:1;pointer-events:auto}.card{width:min(100%,22rem);padding:1.1rem;border-radius:1.2rem;background:linear-gradient(180deg,rgba(9,20,35,.92),rgba(9,20,35,.8));border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 48px rgba(2,7,18,.34)}.card h3{font-size:clamp(1.5rem,4vw,2rem)}.card p{margin:0;color:var(--muted);line-height:1.65}.card .actions{margin-top:1.05rem}
.deck{border-radius:1.4rem;padding:1.15rem}.deck h3{margin:.75rem 0 0;color:#fff8ef;font-size:1.1rem}.list{display:grid;gap:.75rem;margin-top:1rem}.list div{display:flex;justify-content:space-between;gap:1rem;padding:.9rem 1rem;border-radius:1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}.band{margin-top:1rem;padding:1rem;border-radius:1rem;background:linear-gradient(135deg,rgba(255,139,82,.16),rgba(143,232,255,.1));border:1px solid rgba(255,255,255,.08)}.band p{margin:.4rem 0 0;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem}.feature{border-radius:1.35rem;padding:1.2rem}.feature h3{margin:.8rem 0 .55rem;color:#fff8ef;font-size:1.2rem}.feature p{margin:0;line-height:1.72}.pill{display:inline-flex;align-items:center;gap:.45rem;color:var(--cool);font-size:.75rem;letter-spacing:.14em;text-transform:uppercase}.pill:before{content:"";width:.5rem;height:.5rem;border-radius:50%;background:currentColor}.foot{padding:0 0 2.6rem;color:rgba(244,251,255,.62);text-align:center;font-size:.9rem}
@media (max-width:720px){.card .actions,.actions{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
<div class="game-shell">
  <div class="stage" id="stage">
    <canvas id="game"></canvas>
    <div class="cover" id="cover">
      <div class="card">
        <span class="eyebrow" id="coverKicker">Paused</span>
        <h3 id="coverTitle">Run paused.</h3>
        <p id="coverText">Resume to keep moving, or restart for a fresh run.</p>
        <div class="actions">
          <button class="btn btn-primary" id="primary" type="button">Resume</button>
          <button class="btn btn-secondary" id="secondary" type="button">Restart</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(()=>{
const c=document.getElementById("game"),stage=document.getElementById("stage"),cover=document.getElementById("cover"),coverKicker=document.getElementById("coverKicker"),coverTitle=document.getElementById("coverTitle"),coverText=document.getElementById("coverText"),primary=document.getElementById("primary"),secondary=document.getElementById("secondary"),x=c.getContext("2d"),T=Math.PI*2,S=1/120;
const V={w:0,h:0,d:1},W={g:2380,j:-1040,jb:.16,ct:.12,sg:1650,dg:3000,bs:300,ms:720,bo:860,cam:.25};
const I={j:false,jq:false,d:false,p:false,r:false},JK=new Set(["Space","ArrowUp","KeyW"]),DK=new Set(["ArrowDown","KeyS"]);
const G={st:"ready",t:0,cam:0,dist:0,score:0,best:0,spd:W.bs,tspd:W.bs,boost:0,combo:0,comboT:0,shake:0,flash:0,over:0,terrain:[],rings:[],haz:[],spr:[],hoops:[],parts:[],decor:[],clouds:[],nx:0,nd:0,nc:0};
const P={x:220,y:0,py:0,vy:0,w:46,h:58,g:true,cy:0,jb:0,roll:0,anim:0,inv:0,hurt:0,trail:0,sq:0,rings:0};
function rs(){V.w=Math.max(320,stage.clientWidth||innerWidth);V.h=Math.max(360,stage.clientHeight||innerHeight);V.d=Math.min(devicePixelRatio||1,2);c.width=Math.max(1,Math.floor(V.w*V.d));c.height=Math.max(1,Math.floor(V.h*V.d));x.setTransform(V.d,0,0,V.d,0,0);x.imageSmoothingEnabled=false}
const cl=(n,a,b)=>Math.max(a,Math.min(b,n)),lp=(a,b,t)=>a+(b-a)*t,sm=t=>t*t*(3-2*t),ap=(v,t,d)=>v<t?Math.min(t,v+d):Math.max(t,v-d),rn=(a,b)=>Math.random()*(b-a)+a,ri=(a,b)=>Math.floor(rn(a,b+1));
function save(){try{localStorage.setItem("velocity-runner-best",String(G.best))}catch(e){}}function load(){try{return Number(localStorage.getItem("velocity-runner-best")||0)}catch(e){return 0}}function tm(){return{base:Math.max(V.h*.74,330),min:Math.max(V.h*.34,160),max:Math.min(V.h-42,Math.max(V.h*.86,270))}}
function ext(tx){const m=tm();while(G.terrain[G.terrain.length-1].x<tx){const p=G.terrain[G.terrain.length-1],dx=rn(150,260);let y=p.y+rn(-92,92)+Math.sin((p.x+dx)*.003)*22;if(Math.random()<.22)y=lp(y,m.base,.65);G.terrain.push({x:p.x+dx,y:cl(y,m.min,m.max)})}}function gy(px){ext(px+V.w*2);const a=G.terrain;for(let i=0;i<a.length-1;i++){const l=a[i],r=a[i+1];if(px>=l.x&&px<=r.x){const t=sm((px-l.x)/(r.x-l.x));return lp(l.y,r.y,t)}}return a[a.length-1].y}function ga(px){const s=18;return Math.atan2(gy(px+s)-gy(px-s),s*2)}
function ring(x0,y0,o={}){G.rings.push({x:x0,y:y0,r:o.r||11,p:Math.random()*T,v:!!o.v,cd:o.cd||0,life:o.life==null?999:o.life,vx:o.vx||0,vy:o.vy||0,dead:false})}function line(x0,y0,n,dx,dy){for(let i=0;i<n;i++)ring(x0+i*dx,y0+i*dy)}function arc(cx,gy0,n){const w=rn(170,250),h=rn(90,150),m=Math.max(1,n-1);for(let i=0;i<n;i++){const t=i/m;ring(cx+(t-.5)*w,gy0-62-Math.sin(t*Math.PI)*h)}}function spike(x0){G.haz.push({t:"sp",x:x0,y:gy(x0),w:40,h:28,dead:false})}function bot(x0){G.haz.push({t:"bot",x:x0,y:gy(x0)-28,w:42,h:32,p:Math.random()*T,dead:false})}function spring(x0){G.spr.push({x:x0,y:gy(x0),w:48,h:16,cd:0})}function hoop(x0,y0){G.hoops.push({x:x0,y:y0,r:28,p:Math.random()*T,dead:false})}
function part(o){G.parts.push({x:o.x,y:o.y,vx:o.vx||0,vy:o.vy||0,life:o.life,max:o.life,s:o.s,c:o.c,g:o.g||0,k:o.k||"d"})}function dust(x0,y0,n,c0,s0){for(let i=0;i<n;i++)part({x:x0,y:y0,vx:rn(-s0,s0),vy:rn(-220,-40),life:rn(.18,.42),s:rn(4,9),c:c0,g:900})}function spark(x0,y0,n,c0){for(let i=0;i<n;i++)part({x:x0,y:y0,vx:rn(-180,180),vy:rn(-180,180),life:rn(.12,.28),s:rn(2,5),c:c0})}function clouds(tx){while(G.nc<tx){const x0=G.nc+rn(140,300);G.clouds.push({x:x0,y:rn(40,V.h*.42),s:rn(.7,1.6),v:rn(3,12)});G.nc=x0}}function decor(tx){while(G.nd<tx){const x0=G.nd+rn(130,260);G.decor.push({x:x0,y:gy(x0),k:["palm","flower","rock","totem"][ri(0,3)],s:rn(.7,1.35),p:Math.random()*T});G.nd=x0}}
function chall(tx){while(G.nx<tx){const x0=G.nx+rn(160,280),y0=gy(x0),sl=Math.abs(ga(x0)),r=Math.random();if(r<.24)line(x0,y0-rn(78,118),ri(6,9),38,ri(-3,3));else if(r<.42)arc(x0+60,y0,ri(7,9));else if(r<.58&&sl<.18){spike(x0+36);line(x0-20,y0-112,5,40,0)}else if(r<.74&&sl<.22){bot(x0+24);line(x0-24,y0-122,4,42,0)}else if(r<.88&&sl<.24){spring(x0);arc(x0+120,y0,8)}else{hoop(x0+30,y0-rn(150,220));arc(x0+110,y0-10,6)}G.nx=x0+rn(250,420)}}function pb(){return{l:P.x-P.w*.3,r:P.x+P.w*.3,t:P.y-P.h,b:P.y}}
function jump(){P.g=false;P.cy=0;P.jb=0;P.vy=W.j-Math.min(55,(G.spd-W.bs)*.08);P.roll+=.7;dust(P.x-14,P.y+2,8,"rgba(255,255,255,.65)",140)}function boost(x0,y0){G.boost=1.2;G.spd=Math.max(G.spd,W.bo*.92);P.vy=Math.min(P.vy,-180);G.shake=Math.max(G.shake,6);spark(x0,y0,12,"#7df8ff")}function burst(x0,y0){const n=Math.min(20,P.rings);for(let i=0;i<n;i++){const a=i/Math.max(1,n)*T+rn(-.2,.2);ring(x0,y0,{v:true,cd:.42,life:2.1,vx:Math.cos(a)*rn(150,300),vy:Math.sin(a)*rn(150,300)-190})}P.rings=0;P.inv=1.75;P.hurt=.38;P.vy=-720;G.combo=0;G.comboT=0;G.shake=Math.max(G.shake,10);G.flash=.16;spark(x0,y0,14,"#fff7c7")}
function syncCover(){if(G.st==="run"){cover.classList.remove("show");return}cover.classList.add("show");if(G.st==="ready"){coverKicker.textContent="Ready";coverTitle.textContent="Press start to run.";coverText.textContent="Jump with Space, W, Up, or a tap. Use P to pause and R to restart.";primary.textContent="Start Run";secondary.hidden=true;return}if(G.st==="pause"){coverKicker.textContent="Paused";coverTitle.textContent="Run paused.";coverText.textContent="Resume to keep moving, or restart for a fresh run.";primary.textContent="Resume";secondary.hidden=false;secondary.textContent="Restart";return}coverKicker.textContent="Run Over";coverTitle.textContent="Score "+Math.floor(G.score);coverText.textContent="Best score "+Math.floor(G.best)+". Start another run when ready.";primary.textContent="Play Again";secondary.hidden=false;secondary.textContent="Restart"}
function hurt(x0,y0){if(P.inv>0||G.st!=="run")return;if(P.rings>0)burst(x0||P.x,y0||P.y-P.h*.6);else{G.st="over";G.over=0;G.best=Math.max(G.best,Math.floor(G.score));save();G.shake=Math.max(G.shake,16);G.flash=.22;spark(P.x,P.y-P.h*.6,24,"#ff9b6a");syncCover()}}
function reset(ready=true){I.j=I.jq=I.d=I.p=I.r=false;G.st=ready?"ready":"run";G.t=G.cam=G.dist=G.score=G.boost=G.combo=G.comboT=G.shake=G.flash=G.over=0;G.best=load();G.spd=G.tspd=W.bs;G.terrain=[];G.rings=[];G.haz=[];G.spr=[];G.hoops=[];G.parts=[];G.decor=[];G.clouds=[];G.nx=0;G.nd=0;G.nc=0;Object.assign(P,{x:220,y:0,py:0,vy:0,g:true,cy:0,jb:0,roll:0,anim:0,inv:0,hurt:0,trail:0,sq:0,rings:0});const m=tm();G.terrain.push({x:-420,y:m.base},{x:-80,y:m.base},{x:140,y:m.base-8},{x:320,y:m.base+10});ext(V.w*3);P.y=gy(P.x);G.cam=P.x-V.w*W.cam;G.nx=P.x+320;G.nd=G.cam-200;G.nc=G.cam*.18-100;decor(G.cam+V.w*2);clouds(G.cam*.18+V.w*2);chall(P.x+V.w*2.2);syncCover()}function startRun(queueJump=false){if(G.st==="over")reset(false);else G.st="run";syncCover();if(queueJump){if(!I.j)I.jq=true;I.j=true}}
function take(r){r.dead=true;P.rings++;G.combo=Math.min(G.combo+1,99);G.comboT=2.2;G.score+=30+Math.min(G.combo,12)*4;spark(r.x,r.y,5,"#ffe27a")}function upClouds(dt){for(const n of G.clouds)n.x+=n.v*dt;const m=G.cam*.18-320;while(G.clouds.length&&G.clouds[0].x<m)G.clouds.shift();clouds(G.cam*.18+V.w*2.2)}function upParts(dt){for(const p of G.parts){p.life-=dt;p.vy+=p.g*dt;p.x+=p.vx*dt;p.y+=p.vy*dt}G.parts=G.parts.filter(p=>p.life>0)}
function upRings(dt){const cx=P.x,cy=P.y-P.h*.56;for(const r of G.rings){if(r.dead)continue;if(r.v){r.cd=Math.max(0,r.cd-dt);r.life-=dt;r.vy+=1900*dt;r.x+=r.vx*dt;r.y+=r.vy*dt;const g=gy(r.x);if(r.y>g-12){r.y=g-12;r.vy*=-.42;r.vx*=.92}if(r.life<=0){r.dead=true;continue}}else r.p+=dt*6;const dx=cx-r.x,dy=cy-r.y,d2=dx*dx+dy*dy,pr=P.w*.34+r.r;if(r.cd<=0&&d2<pr*pr)take(r)}G.rings=G.rings.filter(r=>!r.dead&&r.x>G.cam-180)}function upHoops(dt){const cx=P.x,cy=P.y-P.h*.56;for(const h of G.hoops){h.p+=dt*5;const dx=cx-h.x,dy=cy-h.y,rr=h.r+20;if(!h.dead&&dx*dx+dy*dy<rr*rr){h.dead=true;boost(h.x,h.y)}}G.hoops=G.hoops.filter(h=>!h.dead&&h.x>G.cam-160)}
