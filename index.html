// ============ SIZING ============

  const cont = document.getElementById('app');

  H = cont.clientHeight;

  canvas.height = H;
  SCALE = Math.max(1, Math.floor(Math.min(W, H) / 240));
}
resize();
window.addEventListener('resize', resize);

// ============ PIXEL DRAWING HELPERS ============
function drawPixelGrid(x, y, grid, pixSize, colors) {
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      const val = grid[r][c];
      if (val > 0 && colors[val]) {
        ctx.fillStyle = colors[val];
        ctx.fillRect(Math.floor(x + c * pixSize), Math.floor(y + r * pixSize), pixSize, pixSize);
      }
    }
  }
}

// Enemy — robot/badnik style
const ENEMY_SPRITE = [

// ============ AUDIO (Web Audio API) ============
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, type, vol) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.value = vol || 0.08;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxRing() { playTone(1200, 0.08, 'square', 0.06); setTimeout(() => playTone(1600, 0.1, 'square', 0.05), 60); }
function sfxJump() { playTone(400, 0.15, 'square', 0.06); }
function sfxSpring() { playTone(600, 0.1, 'square', 0.07); setTimeout(() => playTone(900, 0.15, 'square', 0.06), 80); }
function sfxHit() { playTone(200, 0.3, 'sawtooth', 0.08); }
function sfxDeath() { playTone(400, 0.15, 'sawtooth', 0.08); setTimeout(() => playTone(300, 0.15, 'sawtooth', 0.07), 150); setTimeout(() => playTone(200, 0.3, 'sawtooth', 0.06), 300); }
function sfxSpin() { playTone(150, 0.2, 'sawtooth', 0.05); }

// ============ GAME STATE ============
const GRAVITY = 0.55;
const JUMP_FORCE = -11;
const MAX_SPEED = 14;
const ACCEL = 0.015;
const GROUND_Y_RATIO = 0.72;

let state = 'title'; // title, playing, gameover
let hiScore = 0;
let player, camera, rings, obstacles, particles, platforms, decorations;
let groundSegments, speed, distance, ringCount, lives, invincibleTimer, gameTime;
let lastFrameTime = 0;

function groundY() { return H * GROUND_Y_RATIO; }

function initGame() {
  const gy = groundY();
  player = {
    x: W * 0.2,
    y: gy - 40 * SCALE / 2,
    vy: 0,
    w: 10 * SCALE,
    h: 10 * SCALE,
    grounded: true,
    jumping: false,
    spinning: false,
    spinTimer: 0,
    frame: 0,
    frameTimer: 0,
    jumpHeld: false,
    jumpTime: 0,
  };
  camera = { x: 0 };
  rings = [];
  obstacles = [];
  particles = [];
  platforms = [];
  decorations = [];
  groundSegments = [];
  speed = 4;
  distance = 0;
  ringCount = 0;
  lives = 3;
  invincibleTimer = 0;
  gameTime = 0;

  // Generate initial world
  generateWorld(0, W * 3);
}

// ============ WORLD GENERATION ============
let lastGenX = 0;

function generateWorld(fromX, toX) {
  const gy = groundY();
  const segW = 60 * SCALE;

  // Ground segments
  for (let x = fromX; x < toX; x += segW) {
    const hasGap = Math.random() < 0.06 && x > W;
    groundSegments.push({ x, w: segW, gap: hasGap, h: 20 * SCALE });
  }

  // Objects
  for (let x = fromX + 200; x < toX; x += 80 + Math.random() * 200) {
    const roll = Math.random();
    if (roll < 0.35) {
      // Ring cluster
      const count = 1 + Math.floor(Math.random() * 5);
      const arc = Math.random() < 0.4;
      for (let i = 0; i < count; i++) {
        const ry = arc ? gy - 50 * SCALE - Math.sin(i / count * Math.PI) * 60 * SCALE : gy - 40 * SCALE;
        rings.push({ x: x + i * 20 * SCALE, y: ry, w: 7 * SCALE, h: 7 * SCALE, collected: false, sparkle: 0 });
      }
    } else if (roll < 0.55) {
      // Spikes
      obstacles.push({ type: 'spike', x, y: gy - 7 * SCALE, w: 7 * SCALE, h: 7 * SCALE });
    } else if (roll < 0.7) {
      // Enemy
      obstacles.push({ type: 'enemy', x, y: gy - 14 * SCALE, w: 8 * SCALE, h: 7 * SCALE, alive: true });
    } else if (roll < 0.82) {
      // Spring
      obstacles.push({ type: 'spring', x, y: gy - 7 * SCALE, w: 7 * SCALE, h: 7 * SCALE, bouncing: false, bounceTimer: 0 });
    } else if (roll < 0.95) {
      // Floating platform with rings
      const py = gy - 80 * SCALE - Math.random() * 60 * SCALE;
      platforms.push({ x, y: py, w: 50 * SCALE, h: 6 * SCALE });
      // Rings on platform
      for (let i = 0; i < 3; i++) {
        rings.push({ x: x + 8 * SCALE + i * 14 * SCALE, y: py - 14 * SCALE, w: 7 * SCALE, h: 7 * SCALE, collected: false, sparkle: 0 });
      }
    }
  }

  // Background decorations (trees, flowers, loops)
  for (let x = fromX; x < toX; x += 120 + Math.random() * 250) {
    const dtype = Math.random() < 0.5 ? 'tree' : (Math.random() < 0.5 ? 'flower' : 'hill');
    decorations.push({ type: dtype, x, layer: Math.random() < 0.5 ? 0 : 1 });
  }

  lastGenX = toX;
}

// ============ PARTICLES ============
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 1) * 5,
      life: 0.5 + Math.random() * 0.5,
      color,
      size: SCALE * (1 + Math.random() * 2),
    });
  }
}

function spawnRingLoss(px, py) {
  const lost = Math.min(ringCount, 15);
  for (let i = 0; i < lost; i++) {
    const angle = (i / lost) * Math.PI * 2;
    particles.push({
      x: px, y: py,
      vx: Math.cos(angle) * (3 + Math.random() * 4),
      vy: Math.sin(angle) * (3 + Math.random() * 4) - 3,
      life: 1.5,
      color: '#ffcc00',
      size: SCALE * 3,
      isRing: true,
    });
  }
}

// ============ UPDATE ============
function update(dt) {
  if (state !== 'playing') return;
  gameTime += dt;

  // Increase speed over time
  speed = Math.min(MAX_SPEED, 4 + gameTime * ACCEL);
  distance += speed * dt * 60;

  // Generate more world
  const viewRight = camera.x + W * 2;
  if (viewRight > lastGenX - W) {
    generateWorld(lastGenX, lastGenX + W * 3);
  }

  // Camera follows player
  camera.x = player.x - W * 0.2;

  const gy = groundY();
  const p = player;

  // Animation frame
  p.frameTimer += dt;
  if (p.frameTimer > 0.1) { p.frameTimer = 0; p.frame = (p.frame + 1) % 2; }

  // Spinning timer
  if (p.spinning) {
    p.spinTimer -= dt;
    if (p.spinTimer <= 0) p.spinning = false;
  }

  // Gravity
  if (!p.grounded) {
    // Variable jump height
    if (p.jumping && p.jumpHeld && p.vy < 0 && p.jumpTime < 0.25) {
      p.vy += GRAVITY * 0.5 * dt * 60;
      p.jumpTime += dt;
    } else {
      p.vy += GRAVITY * dt * 60;
    }
    p.y += p.vy * dt * 60;
  }

  // Ground collision
  let onGround = false;
  const pFoot = p.y + p.h;
  const pLeft = p.x;
  const pRight = p.x + p.w;

  // Check ground segments
  for (const seg of groundSegments) {
    if (seg.gap) continue;
    const sx = seg.x - camera.x;
    if (pRight > seg.x && pLeft < seg.x + seg.w) {
      if (pFoot >= gy && pFoot < gy + seg.h && p.vy >= 0) {
        p.y = gy - p.h;
        p.vy = 0;
        p.grounded = true;
        p.jumping = false;
        onGround = true;
      }
    }
  }

  // Platform collision
  for (const plat of platforms) {
    if (pRight > plat.x && pLeft < plat.x + plat.w) {
      if (pFoot >= plat.y && pFoot < plat.y + plat.h + 5 * SCALE && p.vy >= 0) {
        p.y = plat.y - p.h;
        p.vy = 0;
        p.grounded = true;
        p.jumping = false;
        onGround = true;
      }
    }
  }

  if (!onGround && p.grounded) {
    p.grounded = false;
  }

  // Fell off screen
  if (p.y > H + 50) {
    loseLife();
    return;
  }

  // Invincibility
  if (invincibleTimer > 0) invincibleTimer -= dt;

  // Ring collection
  for (const ring of rings) {
    if (ring.collected) continue;
    if (rectsOverlap(p.x, p.y, p.w, p.h, ring.x, ring.y, ring.w, ring.h)) {
      ring.collected = true;
      ringCount++;
      sfxRing();
      spawnParticles(ring.x + ring.w / 2, ring.y + ring.h / 2, '#ffdd44', 5);
      // Extra life every 100 rings
      if (ringCount % 100 === 0 && lives < 9) {
        lives++;
        spawnParticles(p.x, p.y, '#ff4444', 10);
      }
    }
  }

  // Obstacle collision
  for (const obs of obstacles) {
    if (obs.type === 'enemy' && !obs.alive) continue;
    if (!rectsOverlap(p.x, p.y, p.w, p.h, obs.x, obs.y, obs.w, obs.h)) continue;

    if (obs.type === 'spring') {
      p.vy = JUMP_FORCE * 1.6;
      p.grounded = false;
      p.jumping = true;
      p.jumpTime = 0;
      obs.bouncing = true;
      obs.bounceTimer = 0.3;
      sfxSpring();
      continue;
    }

    if (obs.type === 'enemy') {
      // Spin or jump on top kills enemy
      if (p.spinning || (p.vy > 0 && p.y + p.h < obs.y + obs.h * 0.5)) {
        obs.alive = false;
        p.vy = JUMP_FORCE * 0.7;
        spawnParticles(obs.x + obs.w / 2, obs.y + obs.h / 2, '#ff4444', 8);
        sfxHit();
        continue;
      }
    }

    // Take damage
    if (invincibleTimer <= 0) {
      if (ringCount > 0) {
        sfxHit();
        spawnRingLoss(p.x, p.y);
        ringCount = 0;
        invincibleTimer = 2;
      } else {
        loseLife();
        return;
      }
    }
  }

  // Spring bounce animation
  for (const obs of obstacles) {
    if (obs.type === 'spring' && obs.bouncing) {
      obs.bounceTimer -= dt;
      if (obs.bounceTimer <= 0) obs.bouncing = false;
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const part = particles[i];
    part.x += part.vx * dt * 60;
    part.y += part.vy * dt * 60;
    if (part.isRing) part.vy += 0.3 * dt * 60;
    part.life -= dt;
    if (part.life <= 0) particles.splice(i, 1);
  }

  // Cleanup off-screen
  const cleanX = camera.x - W;
  rings = rings.filter(r => r.x > cleanX || r.collected);
  obstacles = obstacles.filter(o => o.x > cleanX);
  platforms = platforms.filter(p => p.x + p.w > cleanX);
  groundSegments = groundSegments.filter(g => g.x + g.w > cleanX);
  decorations = decorations.filter(d => d.x > cleanX - 200);

  // Move player forward with world
  p.x += speed * dt * 60;

  // Update HUD
  document.getElementById('score-display').textContent = `RINGS: ${ringCount}`;
  document.getElementById('speed-display').textContent = `SPEED: ${Math.floor(speed * 10)}`;
  document.getElementById('lives-display').textContent = '♥'.repeat(lives);
  document.getElementById('hi-score').textContent = `HI: ${hiScore}`;
}

function loseLife() {
  lives--;
  sfxDeath();
  if (lives <= 0) {
    gameOver();
  } else {
    invincibleTimer = 2;
    const gy = groundY();
    player.y = gy - player.h - 20;
    player.vy = JUMP_FORCE * 0.5;
    player.grounded = false;
    spawnParticles(player.x, player.y, '#ff0000', 12);
  }
}

function gameOver() {
  state = 'gameover';
  const totalScore = ringCount + Math.floor(distance / 100);
  hiScore = Math.max(hiScore, totalScore);
  document.getElementById('final-score').textContent = `RINGS: ${ringCount}`;
  document.getElementById('final-distance').textContent = `DISTANCE: ${Math.floor(distance / 10)}m`;
  document.getElementById('game-over').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
}

function rectsOverlap(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// ============ RENDER ============
function render() {
  ctx.clearRect(0, 0, W, H);

  const bgColor = config.background_color || defaultConfig.background_color;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#1a0a3e');
  skyGrad.addColorStop(0.5, '#2a1a5e');
  skyGrad.addColorStop(1, '#4a2a8e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (parallax)
  const starSeed = 42;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + starSeed) % W + W - (camera.x * 0.05) % W) % W;
    const sy = ((i * 97 + starSeed * 2) % (H * 0.5));
    const ss = (i % 3) + 1;
    ctx.fillRect(sx, sy, ss, ss);
  }

  const gy = groundY();
  const cx = camera.x;

  // Background decorations (parallax layers)
  for (const dec of decorations) {
    const parallax = dec.layer === 0 ? 0.3 : 0.6;
    const dx = dec.x - cx * parallax;
    if (dx < -100 || dx > W + 100) continue;
    drawDecoration(dec, dx, gy);
  }

  // Ground
  const surfaceColor = config.surface_color || defaultConfig.surface_color;
  for (const seg of groundSegments) {
    if (seg.gap) continue;
    const sx = seg.x - cx;
    if (sx > W + 10 || sx + seg.w < -10) continue;

    // Grass top
    ctx.fillStyle = '#44aa44';
    ctx.fillRect(sx, gy, seg.w + 1, 3 * SCALE);

    // Dirt
    ctx.fillStyle = surfaceColor;
    ctx.fillRect(sx, gy + 3 * SCALE, seg.w + 1, seg.h);

    // Dirt pattern
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let px = 0; px < seg.w; px += 8 * SCALE) {
      for (let py = 0; py < seg.h - 4 * SCALE; py += 6 * SCALE) {
        if ((px + py) % (16 * SCALE) < 8 * SCALE) {
          ctx.fillRect(sx + px, gy + 3 * SCALE + py + 3 * SCALE, 4 * SCALE, 2 * SCALE);
        }
      }
    }
  }

  // Platforms
  for (const plat of platforms) {
    const px = plat.x - cx;
    if (px > W + 10 || px + plat.w < -10) continue;
    ctx.fillStyle = '#667788';
    ctx.fillRect(px, plat.y, plat.w, plat.h);
    ctx.fillStyle = '#88aacc';
    ctx.fillRect(px, plat.y, plat.w, 2 * SCALE);
    // Checker pattern
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let i = 0; i < plat.w; i += 8 * SCALE) {
      ctx.fillRect(px + i, plat.y, 4 * SCALE, plat.h);
    }
  }

  // Rings
  for (const ring of rings) {
    if (ring.collected) continue;
    const rx = ring.x - cx;
    if (rx > W + 20 || rx < -20) continue;
    // Animate bob
    const bob = Math.sin(gameTime * 4 + ring.x * 0.01) * 3 * SCALE;
    drawPixelGrid(rx, ring.y + bob, RING_SPRITE, SCALE, RING_COLORS);
    // Shine
    ctx.fillStyle = 'rgba(255,255,200,0.3)';
    ctx.fillRect(rx + 2 * SCALE, ring.y + bob + SCALE, SCALE, SCALE);
  }

  // Obstacles
  for (const obs of obstacles) {
    const ox = obs.x - cx;
    if (ox > W + 20 || ox < -20) continue;
    if (obs.type === 'spike') {
      drawPixelGrid(ox, obs.y, SPIKE_SPRITE, SCALE, SPIKE_COLORS);
    } else if (obs.type === 'enemy' && obs.alive) {
      // Animate enemy bob
      const eBob = Math.sin(gameTime * 3 + obs.x * 0.02) * 2 * SCALE;
      drawPixelGrid(ox, obs.y + eBob, ENEMY_SPRITE, SCALE, ENEMY_COLORS);
    } else if (obs.type === 'spring') {
      const sprY = obs.bouncing ? obs.y - 4 * SCALE : obs.y;
      drawPixelGrid(ox, sprY, SPRING_SPRITE, SCALE, SPRING_COLORS);
    }
  }

  // Player
  const p = player;
  const px = p.x - cx;

  // Invincibility flash
  if (invincibleTimer > 0 && Math.floor(invincibleTimer * 10) % 2 === 0) {
    // Flash - skip drawing
  } else {
    let sprite;
    if (p.spinning) {
      sprite = HERO_BALL;
    } else if (!p.grounded) {
      sprite = HERO_JUMP;
    } else if (p.frame === 0) {
      sprite = HERO_RUN1;
    } else {
      sprite = HERO_RUN2;
    }

    // Spin rotation effect
    if (p.spinning) {
      ctx.save();
      ctx.translate(px + p.w / 2, p.y + p.h / 2);
      ctx.rotate(gameTime * 20);
      drawPixelGrid(-p.w / 2, -p.h / 2, sprite, SCALE, HERO_COLORS);
      ctx.restore();

      // Speed lines
      ctx.strokeStyle = 'rgba(0,200,255,0.4)';
      ctx.lineWidth = SCALE;
      for (let i = 0; i < 3; i++) {
        const ly = p.y + p.h * 0.2 + i * p.h * 0.3;
        ctx.beginPath();
        ctx.moveTo(px - 5 * SCALE - i * 3 * SCALE, ly);
        ctx.lineTo(px - 15 * SCALE - i * 5 * SCALE, ly);
        ctx.stroke();
      }
    } else {
      drawPixelGrid(px, p.y, sprite, SCALE, HERO_COLORS);
    }
  }

  // Speed lines at high speed
  if (speed > 8) {
    const alpha = Math.min(0.4, (speed - 8) / 10);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = SCALE;
    for (let i = 0; i < 5; i++) {
      const lx = Math.random() * W;
      const ly = Math.random() * H;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - 20 * SCALE, ly);
      ctx.stroke();
    }
  }

  // Particles
  for (const part of particles) {
    const partX = part.x - cx;
    ctx.globalAlpha = Math.min(1, part.life * 2);
    if (part.isRing) {
      ctx.fillStyle = part.color;
      ctx.beginPath();
      ctx.arc(partX, part.y, part.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = part.color;
      ctx.fillRect(partX, part.y, part.size, part.size);
    }
  }
  ctx.globalAlpha = 1;
}

function drawDecoration(dec, dx, gy) {
  if (dec.type === 'tree') {
    // Pixel tree
    const s = SCALE * 2;
    ctx.fillStyle = '#2a5a2a';
    ctx.fillRect(dx + 4 * s, gy - 20 * s, 4 * s, 8 * s);
    ctx.fillStyle = '#1a3a1a';
    ctx.fillRect(dx, gy - 28 * s, 12 * s, 10 * s);
    ctx.fillStyle = '#2a6a2a';
    ctx.fillRect(dx + 2 * s, gy - 34 * s, 8 * s, 8 * s);
    ctx.fillStyle = '#3a8a3a';
    ctx.fillRect(dx + 3 * s, gy - 38 * s, 6 * s, 6 * s);
    // Trunk
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(dx + 5 * s, gy - 12 * s, 2 * s, 12 * s);
  } else if (dec.type === 'flower') {
    const s = SCALE;
    ctx.fillStyle = '#55aa55';
    ctx.fillRect(dx + 2 * s, gy - 8 * s, s, 8 * s);
    const colors = ['#ff6688', '#ffaa44', '#ff44aa', '#44aaff'];
    ctx.fillStyle = colors[Math.floor(dec.x) % colors.length];
    ctx.fillRect(dx, gy - 10 * s, 5 * s, 3 * s);
  } else if (dec.type === 'hill') {
    ctx.fillStyle = 'rgba(40,80,40,0.4)';
    ctx.beginPath();
    ctx.ellipse(dx, gy, 80 * SCALE, 30 * SCALE, 0, Math.PI, 0);
    ctx.fill();
  }
}

// ============ INPUT ============
let keys = {};
let touchStartY = 0;

window.addEventListener('keydown', e => {
  keys[e.code] = true;

  if (state === 'title' && (e.code === 'Space' || e.code === 'Enter')) {
    startGame();
    e.preventDefault();
  } else if (state === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) {
    restartGame();
    e.preventDefault();
  } else if (state === 'playing') {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      tryJump();
      e.preventDefault();
    }
    if (e.code === 'ArrowDown') {
      trySpin();
      e.preventDefault();
    }
  }
});

window.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    if (player) player.jumpHeld = false;
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartY = e.touches[0].clientY;
  if (state === 'title') startGame();
  else if (state === 'gameover') restartGame();
  else if (state === 'playing') tryJump();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state === 'playing') {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 30) trySpin();
  }
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (player) player.jumpHeld = false;
});

// Click support
canvas.addEventListener('mousedown', e => {
  if (state === 'title') startGame();
  else if (state === 'gameover') restartGame();
  else if (state === 'playing') tryJump();
});
canvas.addEventListener('mouseup', () => {
  if (player) player.jumpHeld = false;
});

function tryJump() {
  if (!player) return;
  ensureAudio();
  if (player.grounded) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    player.jumping = true;
    player.jumpHeld = true;
    player.jumpTime = 0;
    sfxJump();
  }
}

function trySpin() {
  if (!player) return;
  ensureAudio();
  if (!player.spinning) {
    player.spinning = true;
    player.spinTimer = 0.5;
    sfxSpin();
  }
}

function startGame() {
  ensureAudio();
  state = 'playing';
  initGame();
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
}

function restartGame() {
  startGame();
}

// ============ TITLE CHARACTER ============
function drawTitleChar() {
  const tc = document.getElementById('titleChar');
  const tctx = tc.getContext('2d');
  tctx.clearRect(0, 0, 96, 96);
  const ps = 8;
  for (let r = 0; r < HERO_STAND.length; r++) {
    for (let c = 0; c < HERO_STAND[r].length; c++) {
      const v = HERO_STAND[r][c];
      if (v > 0 && HERO_COLORS[v]) {
        tctx.fillStyle = HERO_COLORS[v];
        tctx.fillRect(c * ps + 4, r * ps, ps, ps);
      }
    }
  }
}
drawTitleChar();

// ============ GAME LOOP ============
function gameLoop(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;

  resize();
  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
